name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      # Verifies the distributable build: dist + .d.ts for every package, the VE
      # recipes compiled to static CSS, and the `'use client'` banner on @otomatty/core.
      - name: Build (library dist)
        run: bun run build

      - name: Build playground (Tailwind)
        run: bun run --filter @m3/example-playground build

      # Compiles every @otomatty/react-vanilla-extract recipe through the real VE Vite
      # plugin — the only place the build-time VE selectors are actually evaluated.
      - name: Build playground (vanilla-extract)
        run: bun run --filter @m3/example-playground-ve build

  # Playwright E2E (issue #4): interactions, axe a11y, and visual regression
  # against both engines' playgrounds. Kept separate from the unit job so the
  # browser download doesn't slow the fast lint/typecheck/test loop.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The Chromium build is pinned by the @playwright/test version in the lockfile.
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: bun run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
