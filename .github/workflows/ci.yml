name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build playground (Tailwind)
        run: bun run --filter @m3/example-playground build

      # Compiles every @m3/react-vanilla-extract recipe through the real VE Vite
      # plugin — the only place the build-time VE selectors are actually evaluated.
      - name: Build playground (vanilla-extract)
        run: bun run --filter @m3/example-playground-ve build
