name: Release

# Publishes the @otomatty/* packages to npm via Changesets.
#
# On every push to main, changesets/action opens (or updates) a "Version
# Packages" PR that bumps versions and writes changelogs from the accumulated
# .changeset/*.md files. Merging that PR re-runs this workflow, finds no pending
# changesets, and runs `bun run release` to build + `changeset publish`.
#
# Setup required once in the repo settings:
#   - Secret NPM_TOKEN: an npm automation token for the user/org that owns the
#     @otomatty scope (npmjs.com → Access Tokens → Automation).
#   - Settings → Actions → General → Workflow permissions: allow GitHub Actions
#     to create and approve pull requests (so the Version PR can be opened).

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create Release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bun run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
